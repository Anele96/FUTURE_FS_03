<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Capsule Studio</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <img src="images/1.png" alt="">
  <div class="logo"><h1>Time Capsule Studio</h1></div>

  <nav id="navbar">
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="#gallery">Gallery</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero" id="home">
  <h2>Preserve Your Memories Forever</h2>
  <p>Capture moments today that will become tomorrow's treasures.</p>
  <button onclick="scrollToContact()">Book a Session</button>
</section>

<section id="services">
  <h2>Our Services</h2>
  <div class="services">
    <div class="card"><h3>📸 Memory Photography</h3></div>
    <div class="card"><h3>🎥 Video Storytelling</h3></div>
    <div class="card"><h3>📦 Time Capsule Creation</h3></div>
  </div>
</section>

<section id="gallery">
  <h2>Gallery</h2>
  <div class="gallery">
    <img src="images/2.png">
    <img src="images/3.png">
    <img src="images/4.png">
  </div>
</section>

<section id="about">
  <h2>About Us</h2>
</section>

<section id="contact">
  <h2>Book a Session</h2>
  <form id="bookingForm">
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <select name="service" required>
      <option value="">Select Service</option>
      <option>Photography</option>
      <option>Video Documentary</option>
      <option>Time Capsule</option>
    </select>
    <input type="date" name="date" required>
    <input type="time" name="time" required>
    <textarea name="message"></textarea>
    <button type="submit">Send Booking</button>
  </form>
</section>

<footer>
<p>© 2026 Time Capsule Studio</p>
</footer>

<script src="js/app.js"></script>
</body>
</html>
